            <div style={{padding:'20px 28px',background:'var(--ink)',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'4px solid var(--red)',flexShrink:0}}>
              <div><h3 style={{margin:0,fontSize:20,fontWeight:800,color:'#fff'}}>Importar Planilha de Veículos</h3><p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>Cole os dados do Excel (Ctrl+V)</p></div>
              <button onClick={()=>{setShowImport(false);setImportData([]);}} style={{width:38,height:38,background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={20}/></button>
            </div>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',padding:20,gap:16}}>
              {importData.length===0?(
                <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'2px dashed var(--border)',borderRadius:16,background:'var(--smoke)',position:'relative'}}>
                  <Icon name="file-spreadsheet" size={52} style={{color:'var(--border)',marginBottom:12}}/>
                  <p style={{fontSize:12,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Pronto para importar</p>
                  <p style={{fontSize:10,color:'var(--muted)',margin:'4px 0 0'}}>Selecione no Excel e CTRL+V · Colunas: OS, Modelo, Chassi, Vendedor, Cliente, Parceiro</p>
                  <textarea onPaste={handlePaste} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',resize:'none'}} autoFocus/>
                </div>
              ):(
                <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
                  <div style={{flex:1,overflow:'auto',border:'1px solid var(--border)',borderRadius:12}} className="scroll-y">
                    <table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
                      <thead style={{background:'var(--smoke)',position:'sticky',top:0}}>
                        <tr>{['OS','Modelo','Chassi','Vendedor','Cliente','Parceiro'].map(h=><th key={h} style={{padding:10,fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--muted)',textAlign:'left',borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr>
                      </thead>
                      <tbody>
                        {importData.map((row,rIdx)=>(
                          <tr key={rIdx} style={{borderBottom:'1px solid var(--smoke)'}}>
                            {['os','modelo','chassi','vendedor','cliente','parceiro'].map(k=>(
                              <td key={k} style={{border:'none',padding:0,height:36}}><input className="excel-input" value={row[k]} onChange={e=>{const d=[...importData];d[rIdx][k]=sanitize(e.target.value);setImportData(d);}}/></td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{paddingTop:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                    <p style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{importData.length} registros</p>
                    <div style={{display:'flex',gap:10}}><button onClick={()=>setImportData([])} className="btn-ghost">Limpar</button><button onClick={commitImport} className="btn-primary">Sincronizar</button></div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* EditModal */}
      {editingCase&&<EditModal req={editingCase} onClose={()=>setEditingCase(null)} isMaster={isMaster}/>}
    </div>
  );
}

// ── StorageView ───────────────────────────────────────────────────────────
function StorageView({requests,vehicles}){
  // Calcula tamanho aproximado dos dados
  const calcSize=(obj)=>{
    try{return new Blob([JSON.stringify(obj)]).size;}
    catch{return 0;}
  };

  const totalRequests=requests.length;
  const totalVehicles=vehicles.length;
  const sizeRequests=calcSize(requests);
  const sizeVehicles=calcSize(vehicles);
  const totalSize=sizeRequests+sizeVehicles;
  const limitBytes=1*1024*1024*1024; // 1GB estimado
  const pct=Math.min(totalSize/limitBytes*100,100);

  const fmt=(b)=>{
    if(b<1024)return b+'B';
    if(b<1024*1024)return (b/1024).toFixed(1)+'KB';
    return (b/1024/1024).toFixed(2)+'MB';
  };

  const withImages=requests.filter(r=>r.images?.length>0);
  const withVideo=requests.filter(r=>r.video);
  const imgBytes=calcSize(requests.map(r=>r.images||[]));
  const vidBytes=calcSize(requests.map(r=>r.video||null));

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
        {[
          {label:'Total de Retornos',v:totalRequests,icon:'file-text',color:'var(--red)'},
          {label:'Veículos Cadastrados',v:totalVehicles,icon:'car',color:'#1A4EC2'},
          {label:'Registros com Fotos',v:withImages.length,icon:'camera',color:'#7C3AED'},
          {label:'Registros com Vídeo',v:withVideo.length,icon:'video',color:'#0A6B34'},
        ].map((k,i)=>(
          <div key={i} className="card" style={{padding:20}}>
            <div style={{width:32,height:32,borderRadius:8,background:k.color+'15',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12,color:k.color}}><Icon name={k.icon} size={16}/></div>
            <p style={{fontSize:32,fontWeight:800,margin:0,letterSpacing:'-.02em'}}>{k.v}</p>
            <p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginTop:4}}>{k.label}</p>
          </div>
        ))}
      </div>

      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',margin:'0 0 16px'}}>Uso de Armazenamento</h3>
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700}}>Espaço utilizado</span>
            <span style={{fontSize:13,fontWeight:800,color:'var(--red)'}}>{fmt(totalSize)}</span>
          </div>
          <div className="progress-track" style={{height:10}}>
            <div className="progress-fill" style={{width:`${pct}%`,background:pct>80?'var(--red)':pct>60?'#F59E0B':'#0A6B34'}}/>
          </div>
          <p style={{fontSize:9,color:'var(--muted)',fontWeight:600,marginTop:6}}>{pct.toFixed(2)}% do armazenamento utilizado</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[
            {label:'Retornos (texto)',size:sizeRequests-imgBytes-vidBytes,color:'var(--red)'},
            {label:'Fotos',size:imgBytes,color:'#7C3AED'},
            {label:'Vídeos',size:vidBytes,color:'#1A4EC2'},
            {label:'Veículos (planilha)',size:sizeVehicles,color:'#0A6B34'},
          ].map((item,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'var(--smoke)',borderRadius:10,border:'1px solid var(--border)'}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:item.color,flexShrink:0}}/>
              <div>
                <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>{item.label}</p>
                <p style={{fontSize:14,fontWeight:800,margin:0}}>{fmt(Math.max(item.size,0))}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{padding:24}}>
        <h3 style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',margin:'0 0 16px'}}>Resumo por Status</h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {STATUS_LIST.map(s=>{
            const n=requests.filter(r=>r.status===s).length;
            const pctS=totalRequests>0?n/totalRequests*100:0;
            const colors={'Pendente':'#C45E00','Em Trabalho':'#1A4EC2','Concluído':'#0A6B34'};
            return(
              <div key={s}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:11,fontWeight:700}}>{s}</span>
                  <span style={{fontSize:11,fontWeight:800,color:colors[s]||'var(--muted)'}}>{n} ({pctS.toFixed(0)}%)</span>
                </div>
                <div className="progress-track">
                  <div className="progress-fill" style={{width:`${pctS}%`,background:colors[s]||'var(--muted)'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── EditModal ─────────────────────────────────────────────────────────────
function EditModal({req,onClose,isMaster}){
  const[status,setStatus]=useState(req.status||'Pendente');
  const[observacaoConclusao,setObservacaoConclusao]=useState(req.observacaoConclusao||'');
  const[dateAgendamento,setDateAgendamento]=useState(req.dateAgendamento||'');
  const[reclamacoes,setReclamacoes]=useState(
    req.reclamacoes?.length>0
      ? req.reclamacoes.map(r=>({...r,outroCat:'',outroArea:''}))
      : [{categorias:[],outroCat:'',areasProblema:[],outroArea:'',descricao:''}]
  );
  const[saving,setSaving]=useState(false);
  const[showConclusao,setShowConclusao]=useState(req.status==='Concluído');

  const updateRec=(idx,field,val)=>setReclamacoes(p=>p.map((r,i)=>i===idx?{...r,[field]:val}:r));

  const toggleCat=(idx,cat)=>{
    const rec=reclamacoes[idx];
    updateRec(idx,'categorias',rec.categorias.includes(cat)?rec.categorias.filter(c=>c!==cat):[...rec.categorias,cat]);
  };

  const toggleArea=(idx,area)=>{
    const rec=reclamacoes[idx];
    updateRec(idx,'areasProblema',rec.areasProblema.includes(area)?rec.areasProblema.filter(a=>a!==area):[...rec.areasProblema,area]);
  };

  const handleStatusChange=(s)=>{
    setStatus(s);
    setShowConclusao(s==='Concluído');
  };

  const handleSave=async()=>{
    for(let i=0;i<reclamacoes.length;i++){
      if(reclamacoes[i].categorias.length===0)return alert(`Reclamação ${i+1}: selecione ao menos uma categoria.`);
      if(!reclamacoes[i].descricao.trim())return alert(`Reclamação ${i+1}: descrição é obrigatória.`);
    }
    if(status==='Concluído'&&!observacaoConclusao.trim())return alert('Adicione uma observação de conclusão.');
    setSaving(true);
    try{
      const reclamacoesFinais=reclamacoes.map(rec=>({
        categorias:rec.categorias,
        areasProblema:rec.areasProblema.map(a=>a==='Outro'&&rec.outroArea.trim()?rec.outroArea.trim():a).filter(Boolean),
        descricao:rec.descricao.trim(),
        image:rec.image||null,
        video:rec.video||null,
      }));
      const payload={status,reclamacoes:reclamacoesFinais,observacaoConclusao:observacaoConclusao.trim()};
      if(isMaster)payload.dateAgendamento=dateAgendamento;
      await col('os_retornos').doc(req.id).update(stripUndefined(payload));
      onClose();
    }catch{alert('Erro ao salvar.');}
    setSaving(false);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.9)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto'}}>
      <div style={{background:'#fff',width:'100%',maxWidth:900,borderRadius:24,boxShadow:'0 40px 80px rgba(0,0,0,.5)',display:'flex',flexDirection:'column',margin:'auto',borderBottom:'5px solid var(--red)'}}>
        <div style={{padding:'20px 28px',background:'var(--ink)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <h3 style={{margin:0,fontSize:18,fontWeight:800,color:'#fff'}}>OS #{req.os}</h3>
              <span style={{padding:'3px 10px',borderRadius:999,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.12)',fontSize:8,fontWeight:800}}>{req.unidade}</span>
            </div>
            <p style={{margin:0,fontSize:9,color:'var(--red)',fontWeight:700,textTransform:'uppercase',marginTop:4}}>{req.vehicleData?.cliente||''}{req.vehicleData?.modelo?' · '+req.vehicleData.modelo:''}</p>
          </div>
          <button onClick={onClose} style={{width:38,height:38,background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={20}/></button>
        </div>

        <div style={{padding:24,overflowY:'auto',maxHeight:'72vh'}} className="scroll-y">
          {/* Status + Data */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Status do Chamado</label>
              <select value={status} onChange={e=>handleStatusChange(e.target.value)} className="input" style={{fontWeight:700,appearance:'auto'}}>
                {STATUS_LIST.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            {isMaster&&(
              <div>
                <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'#1A4EC2',display:'block',marginBottom:6}}>📅 Data de Agendamento (Master)</label>
                <input type="date" value={dateAgendamento} onChange={e=>setDateAgendamento(e.target.value)} className="input" style={{borderColor:'#C0D0F5',background:'#EAF0FF'}}/>
              </div>
            )}
          </div>

          {/* Reclamações */}
          <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
            {reclamacoes.map((rec,idx)=>(
              <div key={idx} style={{border:'1.5px solid var(--border)',borderRadius:14,padding:16,borderLeft:'3px solid var(--red)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <div style={{width:22,height:22,borderRadius:6,background:'var(--red)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800}}>{idx+1}</div>
                  <span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.06em'}}>Reclamação {idx+1}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr',gap:12}}>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Categorias</label>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5,border:'1.5px solid var(--border)',borderRadius:10,padding:10,background:'var(--smoke)'}}>
                      {CATEGORIAS.map(cat=>{
                        const checked=rec.categorias.includes(cat);
                        return(
                          <label key={cat} className={`check-chip ${checked?'selected':''}`} onClick={()=>toggleCat(idx,cat)} style={{cursor:'pointer'}}>
                            <input type="checkbox" checked={checked} onChange={()=>{}} style={{display:'none'}}/>
                            {checked&&<span style={{fontSize:9}}>✓</span>}
                            <span>{cat}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'#1A4EC2',display:'block',marginBottom:6}}>Áreas</label>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5,border:'1.5px solid #C0D0F5',borderRadius:10,padding:10,background:'#EAF0FF'}}>
                      {[...AREAS_PROBLEMA,'Outro'].map(area=>{
                        const checked=rec.areasProblema.includes(area);
                        return(
                          <label key={area} className={`check-chip-area ${checked?'selected':''}`} onClick={()=>toggleArea(idx,area)} style={{cursor:'pointer'}}>
                            <input type="checkbox" checked={checked} onChange={()=>{}} style={{display:'none'}}/>
                            {checked&&<span style={{fontSize:9}}>✓</span>}
                            {area==='Outro'?<span style={{fontStyle:'italic'}}>+ Outro</span>:<span>{area}</span>}
                          </label>
                        );
                      })}
                    </div>
                    {rec.areasProblema.includes('Outro')&&(
                      <input type="text" value={rec.outroArea||''} onChange={e=>updateRec(idx,'outroArea',sanitize(e.target.value))} className="input" placeholder="Descreva a área..." style={{marginTop:8,fontSize:12,borderColor:'#C0D0F5',background:'#EAF0FF'}}/>
                    )}
                  </div>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Descrição</label>
                    <textarea rows={4} value={rec.descricao} onChange={e=>updateRec(idx,'descricao',sanitize(e.target.value))} className="input" style={{resize:'vertical',fontWeight:500,fontSize:12}}/>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Observação de Conclusão */}
          {(showConclusao||status==='Concluído')&&(
            <div style={{background:'#EDFAF3',border:'1.5px solid #AAE6C5',borderRadius:12,padding:16}}>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'#0A6B34',display:'block',marginBottom:6}}>✓ Observação de Conclusão *</label>
              <textarea rows={3} value={observacaoConclusao} onChange={e=>setObservacaoConclusao(sanitize(e.target.value))} className="input" style={{resize:'vertical',fontWeight:500,fontSize:12,background:'#fff',borderColor:'#AAE6C5'}} placeholder="Descreva o que foi feito para concluir este retorno..."/>
            </div>
          )}
        </div>

        <div style={{padding:'16px 24px',background:'var(--smoke)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:10,flexShrink:0}}>
          <button onClick={onClose} className="btn-ghost">Cancelar</button>
          <button onClick={handleSave} disabled={saving} className="btn-primary" style={{minWidth:160}}>
            {saving?<><Icon name="refresh-cw" size={14} className="spin"/> Salvando...</>:<><Icon name="save" size={14}/> Salvar Alterações</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DashboardView ─────────────────────────────────────────────────────────
function DashboardView({requests}){
  const stats=useMemo(()=>{
    let pend=0,trabalho=0,concluido=0;
    const catMap={};const modMap={};const unidadeMap={};const porMes={};
    const today=todayStr();

    requests.forEach(r=>{
      if(r.status==='Pendente')pend++;
      else if(r.status==='Em Trabalho'||r.dateAgendamento===today)trabalho++;
      else if(r.status==='Concluído')concluido++;

      (r.reclamacoes||[]).forEach(rec=>(rec.categorias||[]).forEach(c=>{catMap[c]=(catMap[c]||0)+1;}));
      const mod=r.vehicleData?.modelo||'N/D';
      modMap[mod]=(modMap[mod]||0)+1;
      const uni=r.unidade||'Unidade 1';
      unidadeMap[uni]=(unidadeMap[uni]||0)+1;

      if(r.timestamp){
        const d=new Date(r.timestamp);
        const chave=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        porMes[chave]=(porMes[chave]||0)+1;
      }
    });

    const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
    const topMods=Object.entries(modMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const taxaResolucao=requests.length>0?Math.round(concluido/requests.length*100):0;
    const ultMeses=Object.entries(porMes).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);

    return{tot:requests.length,pend,trabalho,concluido,topCats,topMods,taxaResolucao,unidadeMap,ultMeses};
  },[requests]);

  const maxCat=stats.topCats[0]?.[1]||1;
  const maxMod=stats.topMods[0]?.[1]||1;

  return(
    <div style={{paddingBottom:40}} className="fade-up">
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Indicadores Gerenciais</p>
          <h2 style={{fontSize:36,fontWeight:800,lineHeight:1,color:'var(--ink)',margin:0,letterSpacing:'-.02em'}}>Análises VRZ</h2>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--ink)',color:'#fff',padding:'8px 16px',borderRadius:10}}>
          <span className="pulse-beacon" style={{width:7,height:7,borderRadius:'50%',background:'var(--red)',display:'inline-block'}}/>
          <span style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em'}}>Tempo real</span>
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:16}}>
        {[
          {label:'Total Reclamações',v:stats.tot,sub:'registros',icon:'alert-triangle',dark:true},
          {label:'Pendentes',v:stats.pend,sub:'sem tratativa',icon:'clock',color:'#C45E00',bg:'#FFF4E6',border:'#FFD9A8'},
          {label:'Em Trabalho',v:stats.trabalho,sub:'agendados hoje',icon:'wrench',color:'#1A4EC2',bg:'#EAF0FF',border:'#C0D0F5'},
          {label:'Concluídos',v:stats.concluido,sub:`Taxa ${stats.taxaResolucao}%`,icon:'check-check',red:true},
        ].map((k,i)=>(
          <div key={i} style={{background:k.dark?'var(--ink)':k.red?'var(--red)':k.bg||'var(--smoke)',color:k.dark||k.red?'#fff':'var(--ink)',borderRadius:14,padding:20,border:(!k.dark&&!k.red&&k.border)?`1.5px solid ${k.border}`:'none'}}>
            <div style={{width:32,height:32,borderRadius:8,background:k.dark||k.red?'rgba(255,255,255,.12)':k.color+'20'||'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,color:k.dark||k.red?'#fff':k.color}}><Icon name={k.icon} size={16}/></div>
            <p style={{fontSize:36,fontWeight:800,lineHeight:1,margin:0,letterSpacing:'-.02em'}}>{k.v}</p>
            <p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',marginTop:6,opacity:.7}}>{k.label}</p>
            <p style={{fontSize:8,fontWeight:500,marginTop:2,opacity:.4}}>{k.sub}</p>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:16}}>Top Ocorrências por Categoria</p>

      onLogin({user:'Lucas.Sabino',pass:'29623298',active:true,role:'master'});

              </div>

// ── App ───────────────────────────────────────────────────────────────────
function App(){
  const[loggedIn,setLoggedIn]=useState(null);
  const[view,setView]=useState('request');
  const[showChangePwd,setShowChangePwd]=useState(false);
  const[initDone,setInitDone]=useState(false);

  const{data:requests,loading:reqLoad}=useFirestore('os_retornos');
  const{data:vehicles,loading:vehLoad}=useFirestore('vehicles');
  const{data:usersData,loading:usrLoad}=useFirestore('users');
  const[users,setUsers]=useState([]);

  useEffect(()=>{
    if(usrLoad)return;
    if(!initDone){
      INIT_USERS.forEach(async iu=>{
        const exists=usersData.find(d=>d.user.toLowerCase()===iu.user.toLowerCase());
        if(!exists){try{await col('users').add(iu);}catch(e){console.warn('seed:',e);}}
      });
      setInitDone(true);
    }
    setUsers(usersData);
    setLoggedIn(prev=>{
      if(!prev)return prev;
      const fresh=usersData.find(u=>u.user===prev.user);
      return fresh?{...prev,...fresh}:prev;
    });
  },[usersData,usrLoad]);

  useEffect(()=>{
    const u=auth.onAuthStateChanged(u=>{if(!u)auth.signInAnonymously();});
    return u;
  },[]);

  const role=loggedIn?.role||'solicitante';
  const isMaster=role==='master';

  const addUser=async(u,p,r='solicitante')=>{
    if(r==='master'&&loggedIn?.user!==MASTER_USER)return alert('Somente o Master pode criar usuários Master.');
    try{await col('users').add({user:u,pass:p,active:true,role:r});}catch{alert('Erro ao criar usuário.');}
  };
  const deleteUser=async(userObj)=>{
    if(userObj?.user===MASTER_USER)return alert('O Master não pode ser excluído.');
    if(!window.confirm(`Remover "${userObj?.user}"?`))return;
    try{await col('users').doc(userObj.id).delete();}catch(e){alert('Erro: '+e.message);}
  };
  const toggleUser=async(u)=>{
    if(u.user===MASTER_USER)return;
    const s=!(u.active!==false);
    if(!u.id){setUsers(p=>p.map(x=>x.user===u.user?{...x,active:s}:x));return;}
    try{await col('users').doc(u.id).update({active:s});}catch(e){alert('Erro: '+e.message);}
  };
  const changeRole=async(u,r)=>{
    if(u.user===MASTER_USER)return;
    if((r==='master'||u.role==='master')&&loggedIn?.user!==MASTER_USER)return alert('Somente o Master pode alterar a categoria Master.');
    if(!u.id){setUsers(p=>p.map(x=>x.user===u.user?{...x,role:r}:x));return;}
    try{await col('users').doc(u.id).update({role:r});}catch(e){alert('Erro: '+e.message);}
  };

  const defaultView=(r)=>r==='leitor'?'status':'request';

  const navItems=[
    canDo(role,'newReq')&&{key:'request',icon:'rotate-ccw',label:'Abrir Retorno'},
    {key:'status',icon:'search',label:'Histórico'},
    canDo(role,'manage')&&{key:'admin',icon:'settings',label:'Gestão'},
    canDo(role,'dashboard')&&{key:'dashboard',icon:'bar-chart-2',label:'Indicadores'},
  ].filter(Boolean);

  const loading=reqLoad||vehLoad||usrLoad;

  if(!loggedIn)return <LoginView onLogin={u=>{setLoggedIn(u);setView(defaultView(u.role));}} usersList={users}/>;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'row',background:'#FAFAF9',overflow:'hidden'}}>
      <NetworkStatus/>
      {showChangePwd&&<ChangePasswordModal loggedInUser={loggedIn} onClose={()=>setShowChangePwd(false)}/>}

      {/* Desktop Sidebar */}
      <nav style={{display:'none',width:220,background:'#0D0D0D',padding:'20px 14px',flexDirection:'column',gap:4,flexShrink:0}} id="desktop-nav">
        <style>{`@media(min-width:768px){#desktop-nav{display:flex!important}}`}</style>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 6px 20px',borderBottom:'1px solid rgba(255,255,255,.08)',marginBottom:8}}>
          <div style={{width:36,height:36,background:'var(--red)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 4px 12px rgba(220,31,31,.3)'}}><Icon name="rotate-ccw" size={18}/></div>
          <div><p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.14em',color:'rgba(255,255,255,.3)',margin:0,lineHeight:1}}>Portal Retornos</p><h1 style={{fontSize:20,fontWeight:800,margin:0,lineHeight:1.1,color:'#fff'}}>VRZ</h1></div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>setView(n.key)} className={`nav-item ${view===n.key?'active':''}`}>
              <div className="nav-icon"><Icon name={n.icon} size={15}/></div>
              {n.label}
            </button>
          ))}
        </div>
        <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:12,border:'1px solid rgba(255,255,255,.1)'}}>
          <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>Logado como</p>
          <p style={{fontSize:11,fontWeight:800,textTransform:'uppercase',color:role==='master'?'#FFD700':'var(--red)',margin:'0 0 6px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loggedIn.user}</p>
          <div style={{marginBottom:10}}><RoleBadge role={loggedIn.role}/></div>

        </div>
      </nav>

      {/* Mobile Header */}
      <div id="mobile-header"><style>{`@media(min-width:768px){#mobile-header{display:none!important}}`}</style>
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:'#fff',borderBottom:'1px solid var(--border)',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 16px rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,background:'var(--red)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="rotate-ccw" size={15}/></div>
            <h1 style={{fontSize:20,fontWeight:800,margin:0}}>VRZ Retornos</h1>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{textAlign:'right'}}><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--red)',margin:0,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loggedIn.user}</p><RoleBadge role={loggedIn.role}/></div>
            <button onClick={()=>setShowChangePwd(true)} style={{width:34,height:34,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Icon name="key" size={15}/></button>
            <button onClick={()=>{setLoggedIn(null);setView('request');}} style={{width:34,height:34,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Icon name="log-out" size={15}/></button>
          </div>
        </div>
      </div>

      {/* Main */}
      <main style={{flex:1,overflowY:'auto',minWidth:0}} className="scroll-y">
        <div style={{padding:16,paddingTop:0}} id="main-pad">
          <style>{`@media(min-width:768px){#main-pad{padding:28px!important}}@media(max-width:767px){#main-pad{padding-top:64px!important;padding-bottom:80px!important}}`}</style>
          <div style={{maxWidth:1200,margin:'0 auto'}}>
            {loading?<Skeleton/>:(
              <>
                {view==='request'&&canDo(role,'newReq')&&<RequestForm loggedInUser={loggedIn} vehiclesDB={vehicles} requests={requests}/>}
                {view==='status'&&<StatusView requests={requests} loggedInUser={loggedIn}/>}
                {view==='admin'&&canDo(role,'manage')&&<ManagementView requests={requests} loggedInUser={loggedIn} vehicles={vehicles} users={users} onAdd={addUser} onDelete={deleteUser} onToggle={toggleUser} onRole={changeRole}/>}
                {view==='dashboard'&&canDo(role,'dashboard')&&<DashboardView requests={requests}/>}
              </>
            )}
          </div>
        </div>
      </main>

      {/* Mobile Bottom Nav */}
      <div id="mobile-bottom"><style>{`@media(min-width:768px){#mobile-bottom{display:none!important}}`}</style>
        <div className="bottom-nav">
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>setView(n.key)} className={`bottom-nav-btn ${view===n.key?'active':''}`}>
              <Icon name={n.icon} size={21}/>
              <span>{n.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
