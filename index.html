<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portal Retornos VRZ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --red:#DC1F1F;--red-deep:#A81515;--red-light:#FFF0F0;
  --black:#0D0D0D;--ink:#1A1A1A;--smoke:#F7F5F3;--border:#E8E3E0;--muted:#9A9189;
}
body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:#fff;overflow:hidden;color:var(--ink)}
.mono{font-family:'JetBrains Mono',monospace}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse-beacon{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.fade-up{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) forwards}
.fade-in{animation:fadeIn .25s ease forwards}
.slide-in{animation:slideIn .28s cubic-bezier(.22,1,.36,1) forwards}
.shake{animation:shake .25s ease-in-out 0s 2}
.spin{animation:spin 1s linear infinite}
.pulse-beacon{animation:pulse-beacon 2s ease-in-out infinite}
.skeleton{background:linear-gradient(90deg,#f0ece8 25%,#e8e3df 50%,#f0ece8 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}

.scroll-y{overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:3px}
.scroll-y::-webkit-scrollbar-track{background:transparent}
.scroll-y::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}

.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:all .18s;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.4);border:none;background:transparent;width:100%;text-align:left;font-family:'Plus Jakarta Sans',sans-serif}
.nav-item:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-item.active{background:#fff;color:var(--ink)}
.nav-item .nav-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:rgba(255,255,255,.08);flex-shrink:0;transition:all .18s}
.nav-item.active .nav-icon{background:var(--red)}
.nav-item:hover:not(.active) .nav-icon{background:rgba(255,255,255,.18)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -8px 30px rgba(0,0,0,.06)}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;min-width:0;font-family:'Plus Jakarta Sans',sans-serif}
.bottom-nav-btn.active{color:var(--red)}
.bottom-nav-btn span{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;line-height:1}

.input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;outline:none;background:#fff;transition:border-color .2s,box-shadow .2s;color:var(--ink)}
.input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,31,31,.08)}
.input::placeholder{color:var(--muted);font-weight:500}

.btn-primary{background:var(--red);color:#fff;border:none;border-radius:10px;padding:13px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--red-deep)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:#e0d9d5;color:#b0a9a4;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--smoke);color:var(--ink);border:1.5px solid var(--border);border-radius:10px;padding:11px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink);background:#fff}

.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden}

.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.badge-pending{background:#FFF4E6;color:#C45E00;border:1px solid #FFD9A8}
.badge-working{background:#EAF0FF;color:#1A4EC2;border:1px solid #C0D0F5}
.badge-done{background:#EDFAF3;color:#0A6B34;border:1px solid #AAE6C5}
.badge-master{background:linear-gradient(135deg,#0D0D0D,#2A0808);color:#FFD700;border:1px solid #8B6914}
.badge-admin{background:var(--red);color:#fff}
.badge-sol{background:#1A4EC2;color:#fff}
.badge-reader{background:var(--muted);color:#fff}

.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:9px;font-weight:800;text-transform:uppercase;border:1px solid var(--border)}

.vtable thead{background:var(--smoke)}
.vtable thead th{padding:10px 14px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border)}
.vtable tbody tr{border-bottom:1px solid var(--smoke)}
.vtable tbody tr:hover{background:var(--smoke)}
.vtable tbody td{padding:10px 14px;font-size:11px;color:var(--ink)}

.progress-track{height:5px;background:var(--smoke);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width .7s cubic-bezier(.22,1,.36,1)}

.cat-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;background:#FFF0F0;color:var(--red);border:1px solid #FFBDBD}
.area-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;background:#EAF0FF;color:#1A4EC2;border:1px solid #C0D0F5}

.excel-input{border:none;width:100%;height:100%;padding:6px 10px;background:transparent;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;outline:none}
.excel-input:focus{background:#FFFBE6;box-shadow:inset 0 0 0 2px var(--red)}

.check-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;border:1.5px solid var(--border);transition:all .12s;background:#fff;user-select:none}
.check-chip.selected{background:var(--red-light);border-color:#FFBDBD;color:var(--red);font-weight:700}
.check-chip-area{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;border:1.5px solid var(--border);transition:all .12s;background:#fff;user-select:none}
.check-chip-area.selected{background:#EAF0FF;border-color:#C0D0F5;color:#1A4EC2;font-weight:700}

@media(max-width:767px){
  .card{border-radius:12px}
  .input{font-size:14px}
}
.login-bg{background:linear-gradient(145deg,#0D0D0D 0%,#1A0505 60%,#2A0808 100%)}
.divider{display:flex;align-items:center;gap:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>

function canDo(role,action){
  const p={
    master:{newReq:true,history:true,manage:true,manageEdit:true,users:true,dashboard:true,deleteReq:true},
    admin: {newReq:true,history:true,manage:true,manageEdit:false,users:false,dashboard:true,deleteReq:false},
    solicitante:{newReq:true,history:true,manage:false,manageEdit:false,users:false,dashboard:true,deleteReq:false},
    leitor:{newReq:false,history:true,manage:false,manageEdit:false,users:false,dashboard:true,deleteReq:false},
  };
  return !!(p[role||'solicitante']?.[action]);
}

const sanitize=(v)=>typeof v!=='string'?v:DOMPurify.sanitize(v);

function stripUndefined(obj){
  if(Array.isArray(obj))return obj.map(stripUndefined);
  if(obj!==null&&typeof obj==='object'){
    const out={};
    Object.entries(obj).forEach(([k,v])=>{if(v!==undefined)out[k]=stripUndefined(v);});
    return out;
  }
  return obj;
}

function fmtDate(ts){return ts?new Date(ts).toLocaleDateString('pt-BR'):'—';}

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Hooks ─────────────────────────────────────────────────────────────────
const useFirestore=(collectionName)=>{
  const[data,setData]=useState([]);const[loading,setLoading]=useState(true);
  useEffect(()=>{
    setLoading(true);
    const u=col(collectionName).onSnapshot(s=>{
      setData(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);
    },()=>setLoading(false));
    return u;
  },[collectionName]);
  return{data,loading};
};

// ── Icon ──────────────────────────────────────────────────────────────────
function Icon({name,size=18,className='',style={}}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      const d=window.lucide.icons[name];
      if(d){
        const[,at,ch]=d;
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        Object.entries({...at,width:size,height:size,class:`lucide ${className}`,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':1.8,'stroke-linecap':'round','stroke-linejoin':'round'}).forEach(([k,v])=>svg.setAttribute(k,v));
        ch.forEach(([t,a])=>{const el=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v));svg.appendChild(el);});
        ref.current.innerHTML='';ref.current.appendChild(svg);
      }
    }
  },[name,size,className]);
  return <span ref={ref} style={style} className="inline-flex shrink-0 items-center justify-center" role="img" aria-label={name}/>;
}

// ── Skeleton ──────────────────────────────────────────────────────────────
const Skeleton=()=>(

const NetworkStatus=()=>{
  const[online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{const h=()=>setOnline(navigator.onLine);window.addEventListener('online',h);window.addEventListener('offline',h);return()=>{window.removeEventListener('online',h);window.removeEventListener('offline',h);};},[]);
  if(online)return null;
  return <div style={{position:'fixed',top:0,left:0,right:0,background:'#F59E0B',color:'#000',textAlign:'center',padding:'6px',fontSize:'11px',fontWeight:700,zIndex:1000}}>📡 Modo Offline</div>;
};

// ── PDF Export ────────────────────────────────────────────────────────────
function exportListPDF(title,dataset){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  doc.setFillColor(13,13,13);doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('VRZ RETORNOS — RELATÓRIO',12,14);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(`Filtro: ${title} | Emissão: ${new Date().toLocaleString('pt-BR')}`,12,22);
  const rows=dataset.map(r=>[r.os,r.vehicleData?.cliente||'—',r.vehicleData?.modelo||'—',r.unidade,r.modalidade,r.tipoAgendamento,r.status]);
  doc.autoTable({
    startY:35,
    head:[['OS','Cliente','Veículo','Unidade','Modalidade','Agendamento','Status']],
    body:rows,
    headStyles:{fillColor:[220,31,31],fontSize:8,fontStyle:'bold'},
    bodyStyles:{fontSize:8},
    theme:'striped'
  });
  doc.save(`VRZ_Retornos_${title.replace(/\s+/g,'_')}.pdf`);
}

function exportSinglePDF(r){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.setFillColor(27,27,27);doc.rect(0,0,210,40,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);
  doc.text(`RETORNO DE OS — #${r.os}`,14,18);
  doc.setFontSize(9);
  doc.text(`Status: ${r.status.toUpperCase()} | Responsável: ${r.responsavel}`,14,28);
  doc.setTextColor(0,0,0);
  let y=50;
  doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('INFORMAÇÕES DA ORDEM DE SERVIÇO',14,y);y+=8;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(`Cliente: ${r.vehicleData?.cliente||'—'}`,14,y);doc.text(`Modelo: ${r.vehicleData?.modelo||'—'}`,110,y);y+=6;
  doc.text(`Chassi: ${r.vehicleData?.chassi||'—'}`,14,y);doc.text(`Vendedor: ${r.vehicleData?.vendedor||'—'}`,110,y);y+=6;
  doc.text(`Parceiro: ${r.vehicleData?.parceiro||'—'}`,14,y);doc.text(`Modalidade: ${r.modalidade}`,110,y);y+=6;
  doc.text(`Unidade: ${r.unidade}`,14,y);doc.text(`Agendamento: ${r.tipoAgendamento}`,110,y);y+=6;
  doc.text(`Local: ${r.localAtendimento||'—'}`,14,y);doc.text(`Data reclamação: ${r.dateReclamacao||'—'}`,110,y);y+=10;
  doc.setFont('helvetica','bold');doc.text('CATEGORIAS:',14,y);y+=6;
  doc.setFont('helvetica','normal');
  const cats=doc.splitTextToSize((r.categorias||[]).join(', '),180);
  doc.text(cats,14,y);y+=cats.length*5+4;
  if(r.areasProblema?.length>0){
    doc.setFont('helvetica','bold');doc.text('ÁREAS DO PROBLEMA:',14,y);y+=6;
    doc.setFont('helvetica','normal');
    const areas=doc.splitTextToSize(r.areasProblema.join(', '),180);
    doc.text(areas,14,y);y+=areas.length*5+4;
  }
  doc.setFont('helvetica','bold');doc.text('RELATO DO PROBLEMA:',14,y);y+=6;
  doc.setFont('helvetica','normal');
  const desc=doc.splitTextToSize(r.descricao||'—',180);
  doc.text(desc,14,y);y+=desc.length*5+8;
  if(r.observacaoConclusao){
    doc.setFont('helvetica','bold');doc.setTextColor(10,107,52);
    doc.text('OBSERVAÇÃO DE CONCLUSÃO:',14,y);y+=6;
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    const obs=doc.splitTextToSize(r.observacaoConclusao,180);
    doc.text(obs,14,y);
  }
  doc.save(`VRZ_Retorno_OS_${r.os}.pdf`);
}

// ── ChangePasswordModal ───────────────────────────────────────────────────
function ChangePasswordModal({loggedInUser,onClose}){
  const[senhaAtual,setSenhaAtual]=useState('');
  const[novaSenha,setNovaSenha]=useState('');
  const[confirmar,setConfirmar]=useState('');
  const[erro,setErro]=useState('');
  const[ok,setOk]=useState(false);
  const[loading,setLoading]=useState(false);
  const[showCur,setShowCur]=useState(false);
  const[showNew,setShowNew]=useState(false);

  const salvar=async()=>{
    setErro('');
    if(senhaAtual!==loggedInUser.pass){setErro('Senha atual incorreta.');return;}
    if(novaSenha.length<6){setErro('Nova senha precisa ter ao menos 6 caracteres.');return;}
    if(novaSenha!==confirmar){setErro('As senhas não coincidem.');return;}
    setLoading(true);
    try{await col('users').doc(loggedInUser.id).update({pass:novaSenha});setOk(true);}
    catch(e){setErro('Erro ao salvar: '+e.message);}
    setLoading(false);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:800,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}} className="fade-in">
      <div style={{background:'#fff',borderRadius:24,overflow:'hidden',maxWidth:400,width:'100%'}}>
        <div style={{background:'var(--ink)',padding:'24px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'4px solid var(--red)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,background:'var(--red)',borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="key" size={18}/></div>
            <div>
              <h3 style={{margin:0,fontSize:16,fontWeight:800,color:'#fff'}}>Alterar Senha</h3>
              <p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>{loggedInUser.user}</p>
            </div>
          </div>
          <button onClick={onClose} style={{width:34,height:34,background:'rgba(255,255,255,.08)',border:'none',borderRadius:9,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={18}/></button>
        </div>
        <div style={{padding:24}}>
          {ok?(
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <div style={{width:56,height:56,background:'#EDFAF3',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}><Icon name="check-circle" size={28}/></div>
              <h4 style={{fontSize:18,fontWeight:800,margin:'0 0 8px'}}>Senha Alterada!</h4>
              <button onClick={onClose} className="btn-primary" style={{width:'100%',padding:13}}>Fechar</button>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {erro&&<div className="shake" style={{background:'var(--red-light)',border:'1px solid #FFBDBD',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:8}}><Icon name="alert-circle" size={14}/><span style={{fontSize:10,fontWeight:700,color:'var(--red)'}}>{erro}</span></div>}
              {[
                {label:'Senha Atual',val:senhaAtual,set:setSenhaAtual,show:showCur,setShow:setShowCur},
                {label:'Nova Senha',val:novaSenha,set:setNovaSenha,show:showNew,setShow:setShowNew},
                {label:'Confirmar',val:confirmar,set:setConfirmar,show:false,setShow:()=>{}},
              ].map((f,i)=>(
                <div key={i}>
                  <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>{f.label}</label>
                  <div style={{position:'relative'}}>
                    <input type={f.show?'text':'password'} value={f.val} onChange={e=>f.set(sanitize(e.target.value))} className="input" style={{paddingRight:44}} placeholder="••••••••"/>
                    {i<2&&<button type="button" onClick={()=>f.setShow(!f.show)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:2}}><Icon name={f.show?'eye-off':'eye'} size={15}/></button>}
                  </div>
                </div>
              ))}
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button onClick={onClose} className="btn-ghost" style={{flex:1}}>Cancelar</button>
                <button onClick={salvar} disabled={loading||!senhaAtual||!novaSenha||!confirmar} className="btn-primary" style={{flex:1}}>
                  {loading?<Icon name="refresh-cw" size={14} className="spin"/>:<Icon name="save" size={14}/>} Salvar
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── RequestForm ───────────────────────────────────────────────────────────
function RequestForm({loggedInUser,vehiclesDB,requests}){
  const[os,setOs]=useState('');
  const[vehicle,setVehicle]=useState(null);
  const[unidade,setUnidade]=useState(UNIDADES[0]);
  const[modalidade,setModalidade]=useState(MODALIDADES[0]);
  const[dateVendaConsignado,setDateVendaConsignado]=useState('');
  const[tipoAgendamento,setTipoAgendamento]=useState(AGENDAMENTOS[0]);
  const[localAtendimento,setLocalAtendimento]=useState('');
  const[dateReclamacao,setDateReclamacao]=useState('');
  const[dateAgendamento,setDateAgendamento]=useState('');
 const EMPTY_RECLAMACAO=()=>({categorias:[],outroCat:'',areasProblema:[],outroArea:'',descricao:'',image:null,video:null,videoError:''});
  const[reclamacoes,setReclamacoes]=useState([EMPTY_RECLAMACAO()]);
  const[submitting,setSubmitting]=useState(false);
  const[done,setDone]=useState(false);

  const handleOSChange=(val)=>{
    const clean=sanitize(val);
    setOs(clean);
    const match=vehiclesDB.find(v=>String(v.os).trim()===clean.trim());
    setVehicle(match||null);
  };

const updateRec=(idx,field,val)=>setReclamacoes(p=>p.map((r,i)=>i===idx?{...r,[field]:val}:r));

  const toggleCat=(idx,cat)=>{
    const rec=reclamacoes[idx];
    if(cat==='Outro'){
      updateRec(idx,'categorias',rec.categorias.includes('Outro')?rec.categorias.filter(c=>c!=='Outro'):[...rec.categorias,'Outro']);
      return;
    }
    updateRec(idx,'categorias',rec.categorias.includes(cat)?rec.categorias.filter(c=>c!==cat):[...rec.categorias,cat]);
  };

  const toggleArea=(idx,area)=>{
    const rec=reclamacoes[idx];
    if(area==='Outro'){
      updateRec(idx,'areasProblema',rec.areasProblema.includes('Outro')?rec.areasProblema.filter(a=>a!=='Outro'):[...rec.areasProblema,'Outro']);
      return;
    }
    updateRec(idx,'areasProblema',rec.areasProblema.includes(area)?rec.areasProblema.filter(a=>a!==area):[...rec.areasProblema,area]);
  };

  const compressImage=(file)=>new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;const mx=900;
        if(w>h&&w>mx){h*=mx/w;w=mx;}else if(h>mx){w*=mx/h;h=mx;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',.65));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });

  const handleImageUpload=async(idx,e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const compressed=await compressImage(file);
    updateRec(idx,'image',compressed);
  };

  const handleVideoUpload=(idx,e)=>{
    updateRec(idx,'videoError','');
    const file=e.target.files[0];
    if(!file)return;
    const url=URL.createObjectURL(file);
    const vid=document.createElement('video');
    vid.preload='metadata';
    vid.onloadedmetadata=()=>{
      URL.revokeObjectURL(url);
      if(vid.duration>10){updateRec(idx,'videoError','O vídeo deve ter no máximo 10 segundos.');return;}
      const reader=new FileReader();
      reader.onload=ev=>updateRec(idx,'video',{data:ev.target.result,name:file.name,type:file.type});
      reader.readAsDataURL(file);
    };
    vid.src=url;
  };

  const addReclamacao=()=>setReclamacoes(p=>[...p,EMPTY_RECLAMACAO()]);
  const removeReclamacao=(idx)=>setReclamacoes(p=>p.filter((_,i)=>i!==idx));

  const reset=()=>{
    setOs('');setVehicle(null);setUnidade(UNIDADES[0]);setModalidade(MODALIDADES[0]);
    setDateVendaConsignado('');setTipoAgendamento(AGENDAMENTOS[0]);setLocalAtendimento('');
    setDateReclamacao('');setDateAgendamento('');setReclamacoes([EMPTY_RECLAMACAO()]);setDone(false);
  };

  const handleSave=async(e)=>{
    e.preventDefault();
    if(!os.trim())return alert('Informe o número da OS.');
    if(!vehicle)return alert('OS não localizada na base de dados. Importe a planilha em Gestão.');
    if(modalidade==='Consignado'&&!dateVendaConsignado)return alert('Informe a data de venda do consignado.');
    for(let i=0;i<reclamacoes.length;i++){
      const rec=reclamacoes[i];
      const cats=rec.categorias.map(c=>c==='Outro'&&rec.outroCat.trim()?rec.outroCat.trim():c).filter(Boolean);
      if(cats.length===0)return alert(`Reclamação ${i+1}: selecione ao menos uma categoria.`);
      if(!rec.descricao.trim())return alert(`Reclamação ${i+1}: descrição é obrigatória.`);
    }
    setSubmitting(true);
    try{
      const reclamacoesFinais=reclamacoes.map(rec=>({
        categorias:rec.categorias.map(c=>c==='Outro'&&rec.outroCat.trim()?rec.outroCat.trim():c).filter(Boolean),
        areasProblema:rec.areasProblema.map(a=>a==='Outro'&&rec.outroArea.trim()?rec.outroArea.trim():a).filter(Boolean),
        descricao:rec.descricao.trim(),
        image:rec.image||null,
        video:rec.video||null,
      }));
      await col('os_retornos').add(stripUndefined({
        os:os.trim(),responsavel:loggedInUser.user,unidade,modalidade,
        dateVendaConsignado:modalidade==='Consignado'?dateVendaConsignado:undefined,
        tipoAgendamento,localAtendimento,vehicleData:vehicle,
        dateReclamacao,dateAgendamento,
        reclamacoes:reclamacoesFinais,
        status:'Pendente',observacaoConclusao:'',timestamp:Date.now()
      }));
      setDone(true);
    }catch{alert('Erro ao registrar. Tente novamente.');}
    setSubmitting(false);
  };
  if(done)return(
    <div style={{maxWidth:420,margin:'0 auto',background:'#fff',borderRadius:20,border:'1.5px solid var(--border)',padding:40,textAlign:'center'}} className="fade-up">
      <div style={{width:64,height:64,background:'#EDFAF3',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}><Icon name="check-circle" size={32}/></div>
      <h2 style={{fontSize:24,fontWeight:800,margin:'0 0 8px'}}>Retorno Registrado!</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24}}>OS #{os} cadastrada com sucesso.</p>
      <button onClick={reset} className="btn-primary" style={{width:'100%',padding:14}}>Novo Retorno</button>
    </div>
  );

  return(
    <div className="fade-up" style={{paddingBottom:16}}>
      <div style={{marginBottom:20}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Pós-Venda VRZ</p>
        <h2 style={{fontSize:32,fontWeight:800,margin:0,letterSpacing:'-.02em'}}>Abrir Retorno de OS</h2>
      </div>

      <form onSubmit={handleSave} style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Dados básicos */}
        <div className="card" style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}}>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Número da OS *</label>
              <input type="text" inputMode="numeric" value={os} onChange={e=>handleOSChange(e.target.value)} placeholder="Ex: 9999" className="input" style={{fontSize:22,fontWeight:800}} required/>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Unidade Solicitante</label>
              <select value={unidade} onChange={e=>setUnidade(e.target.value)} className="input" style={{fontWeight:700,appearance:'auto'}}>{UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}</select>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Modalidade da Venda</label>
              <select value={modalidade} onChange={e=>{setModalidade(e.target.value);setDateVendaConsignado('');}} className="input" style={{fontWeight:700,appearance:'auto'}}>{MODALIDADES.map(m=><option key={m} value={m}>{m}</option>)}</select>
            </div>
            {/* Campo extra para Consignado */}
            {modalidade==='Consignado'&&(
              <div>
                <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'#1A4EC2',display:'block',marginBottom:6}}>📅 Data de Venda (Consignado) *</label>
                <input type="date" value={dateVendaConsignado} onChange={e=>setDateVendaConsignado(e.target.value)} className="input" style={{borderColor:'#C0D0F5',background:'#EAF0FF'}} required/>
              </div>
            )}
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Tipo de Agendamento</label>
              <select value={tipoAgendamento} onChange={e=>setTipoAgendamento(e.target.value)} className="input" style={{fontWeight:700,appearance:'auto'}}>{AGENDAMENTOS.map(a=><option key={a} value={a}>{a}</option>)}</select>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Local do Atendimento</label>
              <input type="text" value={localAtendimento} onChange={e=>setLocalAtendimento(sanitize(e.target.value))} placeholder="Local" className="input" style={{fontWeight:600}}/>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Data da Reclamação</label>
              <input type="date" value={dateReclamacao} onChange={e=>setDateReclamacao(e.target.value)} className="input"/>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Data de Agendamento</label>
              <input type="date" value={dateAgendamento} onChange={e=>setDateAgendamento(e.target.value)} className="input"/>
            </div>
            {/* Responsável — só o nome, sem badge */}
            <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px'}}>
              <div>
                <p style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Responsável</p>
                <p style={{fontSize:13,fontWeight:800,textTransform:'uppercase',margin:0}}>{loggedInUser.user}</p>
              </div>
            </div>
          </div>
        </div>

        {/* Painel do veículo */}
        <div className="card" style={{background:'var(--ink)',padding:20,minHeight:90,display:'flex',alignItems:'center'}}>
          {vehicle?(
            <div style={{width:'100%'}}>
              <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>✓ Dados sincronizados da OS</p>
              <p style={{fontSize:22,fontWeight:800,textTransform:'uppercase',color:'#fff',margin:'0 0 12px'}}>{vehicle.modelo}</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:10}}>
                {[['Cliente',vehicle.cliente],['Chassi',vehicle.chassi],['Vendedor',vehicle.vendedor||'—'],['Parceiro',vehicle.parceiro||'—']].map(([l,v])=>(
                  <div key={l}><p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'0 0 2px'}}>{l}</p><p style={{fontSize:11,color:'rgba(255,255,255,.85)',fontWeight:600,margin:0}}>{v}</p></div>
                ))}
              </div>
            </div>
          ):(
            <div style={{width:'100%',textAlign:'center',padding:'12px 0'}}>
              <Icon name="car" size={28} style={{margin:'0 auto 8px',display:'block',color:'rgba(255,255,255,.15)'}}/>
              <p style={{fontSize:9,color:'rgba(255,255,255,.25)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',margin:0}}>Digite a OS para carregar o veículo automaticamente</p>
              {os.trim()&&!vehicle&&<p style={{fontSize:9,color:'#FFAAAA',fontWeight:600,margin:'6px 0 0'}}>OS "{os}" não encontrada. Importe a planilha em Gestão.</p>}
            </div>
          )}
        </div>

        {/* Reclamações */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {reclamacoes.map((rec,idx)=>(
            <div key={idx} className="card" style={{padding:20,borderLeft:'3px solid var(--red)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:24,height:24,borderRadius:7,background:'var(--red)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>{idx+1}</div>
                  <span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em'}}>Reclamação {idx+1}</span>
                </div>
                {reclamacoes.length>1&&(
                  <button type="button" onClick={()=>removeReclamacao(idx)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',background:'var(--red-light)',color:'var(--red)',border:'1px solid #FFBDBD',borderRadius:7,fontSize:9,fontWeight:800,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                    <Icon name="trash-2" size={12}/> Remover
                  </button>
                )}
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr',gap:14}}>
                {/* Categoria */}
                <div>
                  <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:8}}>Categoria do Problema *</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {CATEGORIAS.map(cat=>{
                      const checked=rec.categorias.includes(cat);
                      return(
                        <label key={cat} className={`check-chip ${checked?'selected':''}`} onClick={()=>toggleCat(idx,cat)}>
                          <input type="checkbox" checked={checked} onChange={()=>{}} style={{display:'none'}}/>
                          {checked&&<span style={{fontSize:9,lineHeight:1}}>✓</span>}
                          {cat==='Outro'?<span style={{fontStyle:'italic'}}>+ Outro</span>:<span>{cat}</span>}
                        </label>
                      );
                    })}
                  </div>
                  {rec.categorias.includes('Outro')&&(
                    <input type="text" value={rec.outroCat} onChange={e=>updateRec(idx,'outroCat',sanitize(e.target.value))} className="input" placeholder="Descreva a categoria..." style={{marginTop:8,fontSize:12,borderColor:'#FFBDBD',background:'var(--red-light)'}}/>
                  )}
                  {rec.categorias.length>0&&(
                    <div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>
                      {rec.categorias.map(c=><span key={c} className="cat-chip">{c==='Outro'&&rec.outroCat?rec.outroCat:c}</span>)}
                    </div>
                  )}
                </div>

                {/* Área */}
                <div>
                  <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'#1A4EC2',display:'block',marginBottom:8}}>Área do Problema</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {[...AREAS_PROBLEMA,'Outro'].map(area=>{
                      const checked=rec.areasProblema.includes(area);
                      return(
                        <label key={area} className={`check-chip-area ${checked?'selected':''}`} onClick={()=>toggleArea(idx,area)}>
                          <input type="checkbox" checked={checked} onChange={()=>{}} style={{display:'none'}}/>
                          {checked&&<span style={{fontSize:9,lineHeight:1}}>✓</span>}
                          {area==='Outro'?<span style={{fontStyle:'italic'}}>+ Outro</span>:<span>{area}</span>}
                        </label>
                      );
                    })}
                  </div>
                  {rec.areasProblema.includes('Outro')&&(
                    <input type="text" value={rec.outroArea} onChange={e=>updateRec(idx,'outroArea',sanitize(e.target.value))} className="input" placeholder="Descreva a área..." style={{marginTop:8,fontSize:12,borderColor:'#C0D0F5',background:'#EAF0FF'}}/>
                  )}
                  {rec.areasProblema.length>0&&(
                    <div style={{marginTop:8,display:'flex',gap:4,flexWrap:'wrap'}}>
                      {rec.areasProblema.map(a=><span key={a} className="area-chip">{a==='Outro'&&rec.outroArea?rec.outroArea:a}</span>)}
                    </div>
                  )}
                </div>

                {/* Descrição + Mídia */}
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Descrição / Relato Inicial *</label>
                    <textarea rows={4} value={rec.descricao} onChange={e=>updateRec(idx,'descricao',sanitize(e.target.value))} placeholder="Descreva detalhadamente..." className="input" style={{resize:'vertical',fontWeight:500,fontSize:12,lineHeight:1.6}}/>
                  </div>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:8}}>📷 1 Foto · 🎥 Vídeo (máx. 10s)</label>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                      {/* Foto */}
                      {!rec.image?(
                        <label style={{width:60,height:60,border:'2px dashed var(--border)',borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',color:'var(--muted)',transition:'all .15s',position:'relative'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--red)';e.currentTarget.style.color='var(--red)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                          <Icon name="camera" size={16}/>
                          <span style={{fontSize:7,fontWeight:700,textTransform:'uppercase'}}>Foto</span>
                          <input type="file" accept="image/*" onChange={e=>handleImageUpload(idx,e)} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>
                        </label>
                      ):(
                        <div style={{width:60,height:60,borderRadius:10,border:'1px solid var(--border)',position:'relative',overflow:'hidden'}}>
                          <img src={rec.image} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                          <button type="button" onClick={()=>updateRec(idx,'image',null)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.55)',color:'#fff',border:'none',cursor:'pointer',fontSize:11,fontWeight:800,opacity:0,transition:'opacity .15s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>✕</button>
                        </div>
                      )}
                      {/* Vídeo */}
                      {!rec.video?(
                        <label style={{width:60,height:60,border:'2px dashed var(--border)',borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',color:'var(--muted)',transition:'all .15s',position:'relative'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#1A4EC2';e.currentTarget.style.color='#1A4EC2';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)';}}>
                          <Icon name="video" size={16}/>
                          <span style={{fontSize:7,fontWeight:700,textTransform:'uppercase'}}>Vídeo</span>
                          <input type="file" accept="video/*" onChange={e=>handleVideoUpload(idx,e)} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>
                        </label>
                      ):(
                        <div style={{position:'relative',width:60,height:60,borderRadius:10,border:'2px solid #C0D0F5',background:'#EAF0FF',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                          <Icon name="video" size={16} style={{color:'#1A4EC2'}}/>
                          <span style={{fontSize:7,fontWeight:700,color:'#1A4EC2'}}>Vídeo</span>
                          <button type="button" onClick={()=>updateRec(idx,'video',null)} style={{position:'absolute',top:-6,right:-6,width:16,height:16,background:'var(--red)',color:'#fff',border:'none',borderRadius:'50%',cursor:'pointer',fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                        </div>
                      )}
                    </div>
                    {rec.videoError&&<p style={{fontSize:10,color:'var(--red)',fontWeight:700,margin:'6px 0 0'}}>{rec.videoError}</p>}
                  </div>
                </div>
              </div>
            </div>
          ))}

          <button type="button" onClick={addReclamacao} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'12px 20px',background:'var(--smoke)',color:'var(--ink)',border:'2px dashed var(--border)',borderRadius:12,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',letterSpacing:'.08em',transition:'all .15s',fontFamily:'Plus Jakarta Sans,sans-serif'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--red)';e.currentTarget.style.color='var(--red)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--ink)';}}>
            <Icon name="plus" size={16}/> Adicionar Reclamação
          </button>
        </div>

        <button disabled={submitting||!vehicle} className="btn-primary" style={{width:'100%',padding:16,fontSize:12}}>
          {submitting?<Icon name="refresh-cw" size={18} className="spin"/>:<><Icon name="send" size={16}/> Confirmar Retorno</>}
        </button>
      </form>
    </div>
  );
}

// ── StatusView ────────────────────────────────────────────────────────────
function StatusView({requests,loggedInUser}){
  const[search,setSearch]=useState('');
  const[tab,setTab]=useState('todos');
  const[unidadeFilter,setUnidadeFilter]=useState('todas');
  const isMaster=loggedInUser?.role==='master';

  const today=todayStr();

  const counts=useMemo(()=>({
    todos:requests.length,
    pendente:requests.filter(r=>r.status==='Pendente').length,
    trabalho:requests.filter(r=>r.status==='Em Trabalho'||r.dateAgendamento===today).length,
    concluido:requests.filter(r=>r.status==='Concluído').length,
  }),[requests,today]);

  const filtered=useMemo(()=>{
    return requests.filter(r=>{
      const t=search.toLowerCase();
      const ms=!t||String(r.os).includes(t)||String(r.vehicleData?.cliente||'').toLowerCase().includes(t)||String(r.vehicleData?.modelo||'').toLowerCase().includes(t)||String(r.responsavel||'').toLowerCase().includes(t);
      const mu=unidadeFilter==='todas'||r.unidade===unidadeFilter;
      let mt=true;
      if(tab==='pendente')mt=r.status==='Pendente';
      else if(tab==='trabalho')mt=r.status==='Em Trabalho'||r.dateAgendamento===today;
      else if(tab==='concluido')mt=r.status==='Concluído';
      return ms&&mu&&mt;
    }).sort((a,b)=>b.timestamp-a.timestamp);
  },[requests,search,tab,unidadeFilter,today]);

  const handleDelete=async(r)=>{
    if(!window.confirm(`Excluir OS #${r.os} permanentemente?`))return;
    try{await col('os_retornos').doc(r.id).delete();}catch(e){alert('Erro ao excluir: '+e.message);}
  };

  return(
    <div className="fade-up" style={{paddingBottom:16}}>
      <div style={{marginBottom:20}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Registros do Portal</p>

        <div style={{display:'flex',gap:3,background:'var(--smoke)',padding:4,borderRadius:12,border:'1px solid var(--border)',overflowX:'auto',marginBottom:12,WebkitOverflowScrolling:'touch'}}>
          {[
            {key:'todos',label:`Todos (${counts.todos})`,color:'var(--ink)'},
            {key:'pendente',label:`Pendente (${counts.pendente})`,color:'#C45E00'},
            {key:'trabalho',label:`Em Trabalho (${counts.trabalho})`,color:'#1A4EC2'},
            {key:'concluido',label:`Concluído (${counts.concluido})`,color:'#0A6B34'},
          ].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:'7px 14px',borderRadius:9,fontSize:9,fontWeight:800,textTransform:'uppercase',whiteSpace:'nowrap',border:'none',cursor:'pointer',letterSpacing:'.06em',transition:'all .15s',fontFamily:'Plus Jakarta Sans,sans-serif',background:tab===t.key?'#fff':'transparent',color:tab===t.key?t.color:'var(--muted)',boxShadow:tab===t.key?'0 2px 8px rgba(0,0,0,.08)':'none'}}>
              {t.label}
            </button>
          ))}
        </div>

        <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          <select value={unidadeFilter} onChange={e=>setUnidadeFilter(e.target.value)} className="input" style={{width:'auto',padding:'8px 14px',fontSize:10,fontWeight:700,appearance:'auto'}}>
            <option value="todas">Todas as Unidades</option>
            {UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          <button onClick={()=>exportListPDF(`Aba_${tab}`,filtered)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'#2563EB',color:'#fff',border:'none',borderRadius:8,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
            <Icon name="file-down" size={13}/> Exportar PDF
          </button>
          <div style={{position:'relative',flex:1,minWidth:200}}>
            <input type="text" placeholder="Buscar OS / Cliente / Responsável..." value={search} onChange={e=>setSearch(e.target.value)} className="input" style={{paddingLeft:36,fontSize:11}}/>
            <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><Icon name="search" size={14}/></div>
          </div>
        </div>
      </div>

      <div className="scroll-y" style={{maxHeight:'65vh',display:'flex',flexDirection:'column',gap:12}}>
        {filtered.length===0?(
          <div style={{padding:'64px 20px',textAlign:'center',background:'#fff',borderRadius:16,border:'1.5px dashed var(--border)'}}>
            <Icon name="inbox" size={32} style={{margin:'0 auto 10px',display:'block',color:'var(--muted)'}}/>
            <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',margin:0}}>Nenhum resultado encontrado</p>
          </div>
        ):filtered.map(r=>(
          <div key={r.id} style={{background:'#fff',border:'1.5px solid var(--border)',borderRadius:14,borderLeft:'3px solid var(--red)',overflow:'visible'}}>
            <div style={{padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',flex:1,minWidth:0}}>
                  <span style={{fontSize:14,fontWeight:800}}>OS #{r.os}</span>
                  <span className="pill">{r.unidade}</span>
                  <span className="pill" style={{background:'var(--smoke)'}}>{r.modalidade}</span>
                  <StatusBadge status={r.status}/>
                  <span className="pill">{r.tipoAgendamento}</span>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button onClick={()=>exportSinglePDF(r)} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',background:'#2563EB',color:'#fff',border:'none',borderRadius:7,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                    <Icon name="file-down" size={12}/> PDF
                  </button>
                  {isMaster&&(
                    <button onClick={()=>handleDelete(r)} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 10px',background:'var(--red)',color:'#fff',border:'none',borderRadius:7,fontSize:9,fontWeight:800,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                      <Icon name="trash-2" size={12}/>
                    </button>
                  )}
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:'6px 16px',marginBottom:12}}>
                {[['Cliente',r.vehicleData?.cliente||'—'],['Veículo',r.vehicleData?.modelo||'—'],['Chassi',r.vehicleData?.chassi||'—'],['Vendedor',r.vehicleData?.vendedor||'—'],['Responsável',r.responsavel||'—'],['Data',fmtDate(r.timestamp)]].map(([l,v])=>(
                  <div key={l}><p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',margin:'0 0 2px'}}>{l}</p><p style={{fontSize:10,fontWeight:600,color:'var(--ink)',margin:0}}>{v}</p></div>
                ))}
              </div>
{r.reclamacoes?.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
                  {r.reclamacoes.map((rec,i)=>(
                    <div key={i} style={{background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',borderLeft:'3px solid var(--red)'}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                        <span style={{width:18,height:18,borderRadius:5,background:'var(--red)',color:'#fff',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,flexShrink:0}}>{i+1}</span>
                        {rec.categorias?.map(c=><span key={c} className="cat-chip">{c}</span>)}
                        {rec.areasProblema?.map(a=><span key={a} className="area-chip">{a}</span>)}
                      </div>
                      <p style={{fontSize:11,color:'var(--ink)',margin:0,lineHeight:1.6}}>{rec.descricao}</p>
                      {rec.image&&<img src={rec.image} style={{width:52,height:52,borderRadius:8,objectFit:'cover',border:'1px solid var(--border)',marginTop:8}} alt=""/>}
                    </div>
                  ))}
                </div>
              )}

              {r.observacaoConclusao&&(
                <div style={{background:'#EDFAF3',border:'1px solid #AAE6C5',borderRadius:10,padding:'10px 14px',marginTop:8}}>
                  <p style={{fontSize:7,fontWeight:800,textTransform:'uppercase',color:'#0A6B34',margin:'0 0 4px'}}>Observação de Conclusão</p>
                  <p style={{fontSize:11,color:'#0A6B34',margin:0,lineHeight:1.6}}>{r.observacaoConclusao}</p>
                </div>
              )}
              
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ManagementView ────────────────────────────────────────────────────────
function ManagementView({requests,loggedInUser,vehicles,users,onAdd,onDelete,onToggle,onRole}){
  const[subView,setSubView]=useState('pendente');
  const[editingCase,setEditingCase]=useState(null);
  const[search,setSearch]=useState('');
  const[importData,setImportData]=useState([]);
  const[showImport,setShowImport]=useState(false);
  const[toDelete,setToDelete]=useState(null);
  const canEdit=canDo(loggedInUser?.role,'manageEdit');
  const isMaster=loggedInUser?.role==='master';
  const today=todayStr();

  const counts={
    pendente:requests.filter(r=>r.status==='Pendente').length,
    trabalho:requests.filter(r=>r.status==='Em Trabalho'||r.dateAgendamento===today).length,
    concluido:requests.filter(r=>r.status==='Concluído').length,
  };

  const filtered=useMemo(()=>{
    return requests.filter(r=>{
      const t=search.toLowerCase();
      const ms=!t||String(r.os).includes(t)||String(r.vehicleData?.cliente||'').toLowerCase().includes(t)||String(r.vehicleData?.modelo||'').toLowerCase().includes(t);
      let mt=true;
      if(subView==='pendente')mt=r.status==='Pendente';
      else if(subView==='trabalho')mt=r.status==='Em Trabalho'||r.dateAgendamento===today;
      else if(subView==='concluido')mt=r.status==='Concluído';
      return ms&&mt;
    }).sort((a,b)=>b.timestamp-a.timestamp);
  },[requests,search,subView,today]);

  const handlePaste=(e)=>{
    const text=e.clipboardData.getData('text');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length)return;
    const headers=lines[0].split(/[,\t]/).map(h=>h.trim().toUpperCase());
    const fi=t=>headers.findIndex(h=>t.some(x=>h.includes(x)));
    const[iO,iM,iCh,iV,iCl,iPa]=[fi(['OS']),fi(['MODELO']),fi(['CHASSI']),fi(['VENDEDOR']),fi(['CLIENTE']),fi(['PARCEIRO'])];
    const rows=(iO!==-1?lines.slice(1):lines).map(l=>{
      const v=l.split(/[,\t]/);
      const g=(i,fb)=>(i!==-1?v[i]:v[fb])?.trim()||'';
      return{os:g(iO,0),modelo:g(iM,1),chassi:g(iCh,2),vendedor:g(iV,3),cliente:g(iCl,4),parceiro:g(iPa,5)};
    }).filter(r=>r.os);
    setImportData(rows);
  };

  const commitImport=async()=>{
    if(!importData.length)return;
    const batch=db.batch();
    importData.forEach(v=>batch.set(col('vehicles').doc(String(v.os).trim()),v));
    try{await batch.commit();alert(`${importData.length} veículos importados!`);setImportData([]);setShowImport(false);}
    catch{alert('Erro ao importar.');}
  };

  const tabs=[
    {key:'pendente',label:`Pendentes (${counts.pendente})`,color:'#C45E00'},
    {key:'trabalho',label:`Em Trabalho (${counts.trabalho})`,color:'#1A4EC2'},
    {key:'concluido',label:`Concluídos (${counts.concluido})`,color:'#0A6B34'},
    {key:'vehicles',label:`Veículos (${vehicles.length})`,color:'var(--ink)'},
    {key:'storage',label:'Armazenamento',color:'#7C3AED'},
    {key:'usuarios',label:'Usuários',color:'#0D0D0D'},
  ];

  return(
    <div className="fade-up" style={{paddingBottom:40}}>
      <div style={{marginBottom:16}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Administração</p>
        <h2 style={{fontSize:32,fontWeight:800,margin:'0 0 16px',letterSpacing:'-.02em'}}>Gestão de Retornos</h2>
      </div>

      {/* Botões de ação */}
      {canEdit&&(
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginBottom:16,flexWrap:'wrap'}}>
          <button onClick={()=>setShowImport(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 18px',background:'var(--ink)',color:'#fff',border:'none',borderRadius:10,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',letterSpacing:'.08em',borderBottom:'3px solid var(--red)',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
            <Icon name="file-up" size={14}/> Importar Planilha
          </button>
          <button onClick={()=>exportListPDF('Todos_Registros',requests)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 18px',background:'#2563EB',color:'#fff',border:'none',borderRadius:10,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',letterSpacing:'.08em',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
            <Icon name="file-down" size={14}/> Exportar PDF
          </button>
        </div>
      )}

      {/* Abas */}
      <div style={{display:'flex',gap:4,background:'var(--smoke)',padding:4,borderRadius:12,border:'1px solid var(--border)',overflowX:'auto',marginBottom:16,WebkitOverflowScrolling:'touch'}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setSubView(t.key)} style={{padding:'8px 14px',borderRadius:9,fontSize:9,fontWeight:800,textTransform:'uppercase',whiteSpace:'nowrap',border:'none',cursor:'pointer',letterSpacing:'.06em',transition:'all .15s',background:subView===t.key?'#fff':'transparent',color:subView===t.key?t.color:'var(--muted)',boxShadow:subView===t.key?'0 2px 8px rgba(0,0,0,.08)':'none',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Modal confirmar exclusão */}
      {toDelete&&(
        <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',maxWidth:360,width:'100%'}}>
            <div style={{background:'var(--red)',padding:'24px 20px',textAlign:'center',color:'#fff'}}>
              <div style={{width:48,height:48,background:'rgba(255,255,255,.2)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Icon name="trash-2" size={22}/></div>
              <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Excluir Registro</h3>
            </div>
            <div style={{padding:20}}>
              <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginBottom:16}}>Confirmar exclusão permanente da OS #{toDelete.os}?</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <button onClick={()=>setToDelete(null)} className="btn-ghost">Cancelar</button>
                <button onClick={async()=>{try{await col('os_retornos').doc(toDelete.id).delete();setToDelete(null);}catch{alert('Erro ao excluir.');}}} className="btn-primary">Confirmar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Tabela veículos */}
      {subView==='vehicles'&&(
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{overflowX:'auto',maxHeight:'60vh'}} className="scroll-y">
            <table className="vtable w-full" style={{minWidth:800}}>
              <thead style={{position:'sticky',top:0}}><tr>{['OS','Modelo','Cliente','Chassi','Vendedor','Parceiro'].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {vehicles.length===0?<tr><td colSpan="6" style={{padding:40,textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)'}}>Nenhum veículo — importe a planilha</td></tr>:vehicles.map((v,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:800,fontSize:13}}>#{v.os}</td>
                    <td style={{fontWeight:600,textTransform:'uppercase'}}>{v.modelo}</td>
                    <td>{v.cliente}</td>
                    <td className="mono" style={{fontSize:10,fontWeight:700}}>{v.chassi}</td>
                    <td>{v.vendedor||'—'}</td>
                    <td>{v.parceiro||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Armazenamento */}
      {subView==='storage'&&(
        <StorageView requests={requests} vehicles={vehicles}/>

      {/* Usuários */}
      {subView==='usuarios'&&(

      {/* Lista de retornos gerenciáveis */}
      {['pendente','trabalho','concluido'].includes(subView)&&(
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{position:'relative'}}>
            <input type="text" placeholder="Buscar OS / Cliente / Modelo..." value={search} onChange={e=>setSearch(e.target.value)} className="input" style={{paddingLeft:36,fontSize:11}}/>
            <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><Icon name="search" size={14}/></div>
            {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:16}}>×</button>}
          </div>
          {filtered.length===0&&<div style={{padding:'48px 20px',textAlign:'center',background:'#fff',borderRadius:14,border:'1.5px dashed var(--border)'}}><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Nenhum retorno nesta categoria</p></div>}
          {filtered.map(req=>(
            <div key={req.id} className="card" style={{display:'flex',alignItems:'center',gap:16,padding:'14px 16px',borderLeft:'3px solid var(--red)'}}>
              <div style={{textAlign:'center',flexShrink:0,minWidth:60}}>
                <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>OS</p>
                <p style={{fontSize:16,fontWeight:800,margin:0}}>#{req.os}</p>
                <StatusBadge status={req.status}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:12,fontWeight:800,textTransform:'uppercase',margin:'0 0 2px',color:'var(--ink)'}}>{req.vehicleData?.cliente||'—'}</p>
                <p style={{fontSize:10,fontWeight:600,color:'var(--muted)',margin:'0 0 2px'}}>{req.vehicleData?.modelo||'—'} · {req.unidade}</p>
                {req.dateAgendamento&&<p style={{fontSize:9,fontWeight:700,color:'#1A4EC2',margin:'0 0 4px'}}>📅 Agend: {req.dateAgendamento}</p>}
